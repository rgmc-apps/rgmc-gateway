<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dev Board — RGMC Gateway</title>
  <link rel="icon" type="image/png" href="/static/badge.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-logo-wrap">
          <img src="/static/logo.png" alt="RGMC Gateway" class="header-logo-img">
        </div>
        <div class="header-divider"></div>
        <div class="header-tagline">RGMC Developer Board</div>
      </div>
      <div id="devHeaderUser" class="header-user"></div>
    </div>
  </header>

  <main class="admin-main">

    <div class="dev-page-header">
      <h1 class="admin-page-title">Dev Board</h1>
      <button class="btn-admin-add" onclick="openItemModal(null)">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        New Item
      </button>
    </div>
    <div class="dev-stats-bar">
      <div class="dev-stat-pill stat-pending">
        <span class="dev-stat-dot dot-pending"></span>
        <span class="dev-stat-count" id="stat-count-pending">—</span>
        <span class="dev-stat-label">Pending</span>
      </div>
      <div class="dev-stat-pill stat-coding">
        <span class="dev-stat-dot dot-coding"></span>
        <span class="dev-stat-count" id="stat-count-coding">—</span>
        <span class="dev-stat-label">Coding</span>
      </div>
      <div class="dev-stat-pill stat-testing">
        <span class="dev-stat-dot dot-testing"></span>
        <span class="dev-stat-count" id="stat-count-testing">—</span>
        <span class="dev-stat-label">Testing</span>
      </div>
      <div class="dev-stat-pill stat-done">
        <span class="dev-stat-dot dot-done"></span>
        <span class="dev-stat-count" id="stat-count-done">—</span>
        <span class="dev-stat-label">Done</span>
      </div>
    </div>

    <!-- Kanban board -->
    <div class="kanban-board" id="kanbanBoard">
      <div class="kanban-col" id="col-pending" data-status="pending">
        <div class="kanban-col-header">
          <span class="kanban-col-dot dot-pending"></span>
          Pending
          <span class="kanban-count" id="count-pending">0</span>
        </div>
        <div class="kanban-cards" id="cards-pending"></div>
      </div>
      <div class="kanban-col" id="col-coding" data-status="coding">
        <div class="kanban-col-header">
          <span class="kanban-col-dot dot-coding"></span>
          Coding
          <span class="kanban-count" id="count-coding">0</span>
        </div>
        <div class="kanban-cards" id="cards-coding"></div>
      </div>
      <div class="kanban-col" id="col-testing" data-status="testing">
        <div class="kanban-col-header">
          <span class="kanban-col-dot dot-testing"></span>
          Testing
          <span class="kanban-count" id="count-testing">0</span>
        </div>
        <div class="kanban-cards" id="cards-testing"></div>
      </div>
      <div class="kanban-col" id="col-done" data-status="done">
        <div class="kanban-col-header">
          <span class="kanban-col-dot dot-done"></span>
          Done
          <span class="kanban-count" id="count-done">0</span>
        </div>
        <div class="kanban-cards" id="cards-done"></div>
      </div>
    </div>

  </main>

  <!-- ── Add / Edit Item Modal ── -->
  <div id="itemModal" class="modal-overlay" onclick="overlayCloseItem(event)">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div>
          <h3 class="modal-title" id="itemModalTitle">New Item</h3>
          <p class="modal-site-name" id="itemModalSub">Fill in the details below</p>
        </div>
        <button class="modal-close" onclick="closeItemModal()" aria-label="Close">&times;</button>
      </div>
      <form id="itemForm" class="modal-form" onsubmit="saveItem(event)">
        <input type="hidden" id="itemEditId">

        <div class="form-group form-group-full">
          <label class="form-label" for="itemTitle">Title <span class="required">*</span></label>
          <input class="form-input" type="text" id="itemTitle" placeholder="Brief description of the task">
        </div>

        <div class="form-group form-group-full">
          <label class="form-label" for="itemDesc">Description</label>
          <textarea class="form-input form-textarea" id="itemDesc" rows="3" placeholder="More detail, acceptance criteria, notes…"></textarea>
        </div>

        <div class="form-group form-group-full">
          <label class="form-label" for="itemSystem">System <span class="form-label-hint">(optional)</span></label>
          <div class="system-select-row">
            <select class="form-input" id="itemSystem">
              <option value="">— None —</option>
            </select>
            <button type="button" class="btn-add-system" onclick="openAddSystemModal()" title="Add a new system">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
              New System
            </button>
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="itemStatus">Status</label>
            <select class="form-input" id="itemStatus">
              <option value="pending">Pending</option>
              <option value="coding">Coding</option>
              <option value="testing">Testing</option>
              <option value="done">Done</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label" for="itemStart">Start Date</label>
            <input class="form-input" type="date" id="itemStart">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="itemEstEnd">Estimated End Date</label>
            <input class="form-input" type="date" id="itemEstEnd">
          </div>
          <div class="form-group" id="itemActualEndGroup">
            <label class="form-label" for="itemActualEnd">Actual End Date</label>
            <input class="form-input" type="date" id="itemActualEnd">
          </div>
        </div>

        <div id="itemFormActions" class="modal-actions">
          <button type="button" class="btn-modal-cancel" onclick="closeItemModal()">Cancel</button>
          <button type="submit" class="btn-modal-submit" id="itemSubmitBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Save
          </button>
        </div>
        <div id="itemFormLoading" class="form-state" style="display:none;">
          <div class="spinner"></div><span>Saving…</span>
        </div>
        <div id="itemFormError" class="form-state form-error" style="display:none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="itemErrorMsg"></span>
        </div>
      </form>
    </div>
  </div>

  <!-- ── Activity Log Modal ── -->
  <div id="logModal" class="modal-overlay" onclick="overlayCloseLog(event)">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div>
          <h3 class="modal-title">Activity Log</h3>
          <p class="modal-site-name" id="logModalTitle"></p>
        </div>
        <button class="modal-close" onclick="closeLogModal()" aria-label="Close">&times;</button>
      </div>
      <div class="modal-form">
        <div id="logList" class="activity-log-list">
          <div class="admin-loading"><div class="spinner"></div><span>Loading…</span></div>
        </div>
        <div class="activity-log-add">
          <textarea class="form-input form-textarea" id="logMessage" rows="2" placeholder="Add an activity note…"></textarea>
          <div class="modal-actions" style="margin-top:10px;">
            <button type="button" class="btn-modal-cancel" onclick="closeLogModal()">Close</button>
            <button type="button" class="btn-modal-submit" onclick="addLog()">
              <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
              Post
            </button>
          </div>
          <div id="logAddError" class="form-state form-error" style="display:none;margin-top:8px;">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
            <span id="logAddErrorMsg"></span>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Add System Modal (from dev board) ── -->
  <div id="addSystemModal" class="modal-overlay" onclick="overlayCloseAddSystem(event)">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div>
          <h3 class="modal-title">Add System</h3>
          <p class="modal-site-name">Fill in the system details below</p>
        </div>
        <button class="modal-close" onclick="closeAddSystemModal()" aria-label="Close">&times;</button>
      </div>
      <form id="addSystemForm" class="modal-form" onsubmit="saveNewSystem(event)">
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="newSysId">System ID <span class="required">*</span> <span class="form-label-hint">(slug, e.g. my-system)</span></label>
            <input class="form-input" type="text" id="newSysId" placeholder="my-system" pattern="[a-z0-9\-]+" title="Lowercase letters, numbers, hyphens only">
          </div>
          <div class="form-group">
            <label class="form-label" for="newSysCategory">Category <span class="required">*</span></label>
            <select class="form-input" id="newSysCategory">
              <option value="RGMC">RGMC</option>
              <option value="SBIC">SBIC</option>
              <option value="NAV Sites">NAV Sites</option>
            </select>
          </div>
        </div>
        <div class="form-group form-group-full">
          <label class="form-label" for="newSysName">System Name <span class="required">*</span></label>
          <input class="form-input" type="text" id="newSysName" placeholder="RGMC My System">
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="newSysPrimaryUrl">Primary URL <span class="required">*</span></label>
            <input class="form-input" type="url" id="newSysPrimaryUrl" placeholder="https://…">
          </div>
          <div class="form-group">
            <label class="form-label" for="newSysPrimaryLabel">Button Label <span class="required">*</span></label>
            <input class="form-input" type="text" id="newSysPrimaryLabel" placeholder="Open" value="Open">
          </div>
        </div>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="newSysBackupUrl">Backup URL <span class="form-label-hint">(optional)</span></label>
            <input class="form-input" type="url" id="newSysBackupUrl" placeholder="http://…">
          </div>
          <div class="form-group">
            <label class="form-label" for="newSysBackupLabel">Backup Label</label>
            <input class="form-input" type="text" id="newSysBackupLabel" placeholder="Backup">
          </div>
        </div>
        <div class="form-row" style="align-items:flex-end;">
          <div class="form-group" style="max-width:160px;">
            <label class="form-label" for="newSysSortOrder">Sort Order</label>
            <input class="form-input" type="number" id="newSysSortOrder" placeholder="0" value="0" min="0">
          </div>
          <div class="form-group" style="max-width:220px;">
            <label class="form-label">Visibility</label>
            <label class="toggle-label">
              <input type="checkbox" id="newSysIsVisible" checked>
              <span class="toggle-text">Visible in access request form</span>
            </label>
          </div>
        </div>
        <div id="addSysFormActions" class="modal-actions">
          <button type="button" class="btn-modal-cancel" onclick="closeAddSystemModal()">Cancel</button>
          <button type="submit" class="btn-modal-submit">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Save System
          </button>
        </div>
        <div id="addSysFormLoading" class="form-state" style="display:none;">
          <div class="spinner"></div><span>Saving…</span>
        </div>
        <div id="addSysFormError" class="form-state form-error" style="display:none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="addSysErrorMsg"></span>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="/static/developer.js"></script>
</body>
</html>
