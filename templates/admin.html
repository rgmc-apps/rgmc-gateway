<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Panel — RGMC Gateway</title>
  <link rel="icon" type="image/png" href="/static/badge.png">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/style.css">
</head>
<body>

  <header class="site-header">
    <div class="header-inner">
      <div class="header-brand">
        <div class="header-logo-wrap">
          <img src="/static/logo.png" alt="RGMC Gateway" class="header-logo-img">
        </div>
        <div class="header-divider"></div>
        <div class="header-tagline">Admin Panel</div>
      </div>
      <div class="header-user">
        <span id="adminUsername" class="header-username"></span>
        <a href="/" class="btn-header-access">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
          Back to Portal
        </a>
        <button class="btn-sign-out" onclick="adminSignOut()">Sign Out</button>
      </div>
    </div>
  </header>

  <main class="admin-main">

    <div class="admin-page-header">
      <h1 class="admin-page-title">Admin Panel</h1>
    </div>

    <!-- Tab Navigation -->
    <div class="admin-tabs">
      <button class="admin-tab active" data-tab="requests" onclick="switchTab('requests')">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
        Requests
        <span class="tab-badge" id="pendingCount"></span>
      </button>
      <button class="admin-tab" data-tab="users" onclick="switchTab('users')">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Users
      </button>
      <button class="admin-tab" data-tab="systems" onclick="switchTab('systems')">
        <svg xmlns="http://www.w3.org/2000/svg" width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="20" height="14" rx="2" ry="2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>
        Systems
      </button>
    </div>

    <!-- ── Requests Panel ── -->
    <div id="panel-requests" class="admin-panel active">
      <div class="admin-status-tabs">
        <button class="status-tab active" data-status="pending" onclick="switchStatus('pending')">Pending</button>
        <button class="status-tab" data-status="approved" onclick="switchStatus('approved')">Approved</button>
        <button class="status-tab" data-status="rejected" onclick="switchStatus('rejected')">Rejected</button>
      </div>
      <div id="requests-body" class="admin-table-wrap">
        <div class="admin-loading"><div class="spinner"></div><span>Loading requests…</span></div>
      </div>
    </div>

    <!-- ── Users Panel ── -->
    <div id="panel-users" class="admin-panel">
      <div id="users-body" class="admin-table-wrap">
        <div class="admin-loading"><div class="spinner"></div><span>Loading users…</span></div>
      </div>
    </div>

    <!-- ── Systems Panel ── -->
    <div id="panel-systems" class="admin-panel">
      <div class="admin-toolbar">
        <button class="btn-admin-add" onclick="openSystemModal(null)">
          <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
          Add System
        </button>
      </div>
      <div id="systems-body" class="admin-table-wrap">
        <div class="admin-loading"><div class="spinner"></div><span>Loading systems…</span></div>
      </div>
    </div>

  </main>

  <!-- ── Edit User Systems Modal ── -->
  <div id="editSystemsModal" class="modal-overlay" onclick="overlayCloseEditSystems(event)">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div>
          <h3 class="modal-title">Edit Systems</h3>
          <p class="modal-site-name" id="editSystemsUser"></p>
        </div>
        <button class="modal-close" onclick="closeEditSystemsModal()" aria-label="Close">&times;</button>
      </div>
      <div class="modal-form">
        <div id="editSystemsGrid">
          <!-- populated by JS -->
        </div>
        <div id="editSystemsActions" class="modal-actions">
          <button type="button" class="btn-modal-cancel" onclick="closeEditSystemsModal()">Cancel</button>
          <button type="button" class="btn-modal-submit" onclick="saveUserSystems()">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Save Systems
          </button>
        </div>
        <div id="editSystemsLoading" class="form-state" style="display:none;">
          <div class="spinner"></div><span>Saving…</span>
        </div>
        <div id="editSystemsError" class="form-state form-error" style="display:none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="editSystemsErrorMsg"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── Reject Request Modal ── -->
  <div id="rejectModal" class="modal-overlay" onclick="overlayCloseReject(event)">
    <div class="modal">
      <div class="modal-header">
        <div>
          <h3 class="modal-title">Reject Access Request</h3>
          <p class="modal-site-name" id="rejectModalName"></p>
        </div>
        <button class="modal-close" onclick="closeRejectModal()" aria-label="Close">&times;</button>
      </div>
      <div class="modal-form">
        <div class="form-group form-group-full" style="margin-bottom:8px;">
          <label class="form-label">Systems Requested</label>
          <p id="rejectSystems" style="margin:6px 0 0;font-size:13px;color:var(--text-secondary);line-height:1.7;"></p>
        </div>
        <div class="form-group form-group-full">
          <label class="form-label" for="rejectRemarks">Reason for Rejection <span class="form-label-hint">(optional — included in the notification email)</span></label>
          <textarea class="form-input form-textarea" id="rejectRemarks" rows="3" placeholder="e.g. Insufficient justification, please resubmit with manager approval…"></textarea>
        </div>
        <div id="rejectFormActions" class="modal-actions">
          <button type="button" class="btn-modal-cancel" onclick="closeRejectModal()">Cancel</button>
          <button type="button" class="btn-modal-reject" onclick="confirmReject()">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
            Confirm Rejection
          </button>
        </div>
        <div id="rejectFormLoading" class="form-state" style="display:none;">
          <div class="spinner"></div><span>Rejecting request…</span>
        </div>
        <div id="rejectFormError" class="form-state form-error" style="display:none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="rejectErrorMsg"></span>
        </div>
      </div>
    </div>
  </div>

  <!-- ── System Add / Edit Modal ── -->
  <div id="systemModal" class="modal-overlay" onclick="overlayCloseSystem(event)">
    <div class="modal modal-lg">
      <div class="modal-header">
        <div>
          <h3 class="modal-title" id="systemModalTitle">Add System</h3>
          <p class="modal-site-name">Fill in the system details below</p>
        </div>
        <button class="modal-close" onclick="closeSystemModal()" aria-label="Close">&times;</button>
      </div>
      <form id="systemForm" class="modal-form" onsubmit="saveSystem(event)">
        <input type="hidden" id="systemEditId">

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="sysId">System ID <span class="required">*</span> <span class="form-label-hint">(slug, e.g. my-system)</span></label>
            <input class="form-input" type="text" id="sysId" placeholder="my-system" pattern="[a-z0-9\-]+" title="Lowercase letters, numbers, hyphens only">
          </div>
          <div class="form-group">
            <label class="form-label" for="sysCategory">Category <span class="required">*</span></label>
            <select class="form-input" id="sysCategory">
              <option value="RGMC">RGMC</option>
              <option value="SBIC">SBIC</option>
              <option value="NAV Sites">NAV Sites</option>
            </select>
          </div>
        </div>

        <div class="form-group form-group-full">
          <label class="form-label" for="sysName">System Name <span class="required">*</span></label>
          <input class="form-input" type="text" id="sysName" placeholder="RGMC My System">
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="sysPrimaryUrl">Primary URL <span class="required">*</span></label>
            <input class="form-input" type="url" id="sysPrimaryUrl" placeholder="https://…">
          </div>
          <div class="form-group">
            <label class="form-label" for="sysPrimaryLabel">Primary Button Label <span class="required">*</span></label>
            <input class="form-input" type="text" id="sysPrimaryLabel" placeholder="Open" value="Open">
          </div>
        </div>

        <div class="form-row">
          <div class="form-group">
            <label class="form-label" for="sysBackupUrl">Backup URL <span class="form-label-hint">(optional)</span></label>
            <input class="form-input" type="url" id="sysBackupUrl" placeholder="http://…">
          </div>
          <div class="form-group">
            <label class="form-label" for="sysBackupLabel">Backup Button Label</label>
            <input class="form-input" type="text" id="sysBackupLabel" placeholder="Backup">
          </div>
        </div>

        <div class="form-group" style="max-width:160px;">
          <label class="form-label" for="sysSortOrder">Sort Order</label>
          <input class="form-input" type="number" id="sysSortOrder" placeholder="0" value="0" min="0">
        </div>

        <div id="sysFormActions" class="modal-actions">
          <button type="button" class="btn-modal-cancel" onclick="closeSystemModal()">Cancel</button>
          <button type="submit" class="btn-modal-submit" id="sysSubmitBtn">
            <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
            Save System
          </button>
        </div>
        <div id="sysFormLoading" class="form-state" style="display:none;">
          <div class="spinner"></div><span>Saving…</span>
        </div>
        <div id="sysFormError" class="form-state form-error" style="display:none;">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
          <span id="sysErrorMsg"></span>
        </div>
      </form>
    </div>
  </div>

  <!-- Toast -->
  <div id="toast" class="toast"></div>

  <script src="/static/admin.js"></script>
</body>
</html>
